<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Bánh Mì 탐험지도</title>
    <style>
        :root {
            --app-bg: #f9f7f4;
            --sidebar-bg: #f5efe9;
            --main-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #777777;
            --accent: #a67c52;
            --border-radius: 12px;
        }

        body {
            margin: 0;
            font-family: 'AppleSDGothicNeo-Regular', 'Malgun Gothic', sans-serif;
            background-color: var(--app-bg);
            display: flex;
            height: 100vh;
            color: var(--text-main);
        }

        #desktop-nav {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eaddcf;
        }

        .logo {
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 50px;
            color: #444;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-main);
        }

        .menu-item.active {
            background-color: #eaddcf;
        }

        #mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--sidebar-bg);
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eaddcf;
            z-index: 1000;
        }

        #mobile-nav .menu-item {
            flex-direction: column;
            padding: 5px;
            font-size: 12px;
            margin: 0;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }

        #mobile-nav .menu-item span {
            margin-bottom: 2px;
            font-size: 16px;
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: var(--app-bg);
        }

        /* 툴팁 스타일 (대시보드와 동일) */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            color: #aaa;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 11px;
            font-weight: normal;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        @media (max-width: 768px) {
            #desktop-nav {
                display: none;
            }

            #mobile-nav {
                display: flex;
            }

            main {
                padding-bottom: 80px;
            }
        }
    </style>
</head>

<body>
    <nav id="desktop-nav">
        <div class="logo">Bánh Mì 탐험지도</div>
        <a href="dashboard.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
        <hr style="width: 80%; border: 0; border-top: 1px solid #eaddcf; margin: 20px auto;">
        <a href="region.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg> 국가별 리뷰
        </a>
        <a href="insight.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path
                    d="M15 14c.2-1 .7-1.7 1.5-2.5C18 10 18 8 16.5 6.5S13 5 11.5 6.5 10 10 11 11.5c.8.8 1.3 1.5 1.5 2.5">
                </path>
                <path d="M9 18h6"></path>
                <path d="M10 22h4"></path>
            </svg> 데이터 정보
        </a>
    </nav>
    <nav id="mobile-nav">
        <a href="dashboard.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
    </nav>
    <main>
        <div class="header">
            <h1 style="margin:0;"> 실제 리뷰 <span style="color:var(--accent);">탐색</span></h1>
            <p style="margin:0;">한국인들의 실제 반미판 리뷰입니다.</p>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h3>Review Emotion Timeline <span class="tooltip">ⓘ<span class="tooltiptext">마우스를 올리면 점수가 나타납니다.</span></span></h3>
            <div id="timeline-chart"
                style="height:150px; display:flex; align-items:flex-end; gap:5px; padding:20px; background:#fdfdfd; border-radius:8px; position: relative;">
            </div>
            <p style="text-align:center; font-size:12px; color:#777; margin-top:10px;">
                시간 경과에 따른 감정 점수 (데이터 해석: 30점 이상 시 '긍정 흐름 유지')
            </p>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <h3>감정별 상세 리뷰 탐색</h3>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin-bottom: 20px;">
                <button class="emotion-filter" data-emotion="기대"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">🤩<br>기대</button>
                <button class="emotion-filter" data-emotion="만족"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">😊<br>만족</button>
                <button class="emotion-filter" data-emotion="실망"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">😟<br>실망</button>
                <button class="emotion-filter" data-emotion="분노"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">😡<br>분노</button>
            </div>

            <div id="detail-list" style="margin-top:20px; padding:15px; background:#f9f7f4; border-radius:8px;">
                <p style="text-align:center; color:#777;">감정 카드를 선택하면 상세 리뷰가 나타납니다.</p>
            </div>
        </div>
    </main>

    <script>
        // 기존 툴팁 스타일과 호환을 위해 추가
        const style = document.createElement('style');
        style.innerHTML = `
            .bar-tooltip {
                position: absolute;
                background: #333;
                color: #fff;
                padding: 4px 8px;
                border-radius: 4px;
                font-size: 10px;
                visibility: hidden;
                z-index: 1000;
            }
        `;
        document.head.appendChild(style);

        const reviewData = {
            "만족": [
                {"name": "오예인 GOH JUI YI", "text": "음식은 맛있고 양도 많아요"},
                {"name": "AMANDA ANG KAH HUI", "text": "맛있어요"},
                {"name": "여행자1", "text": "반미 판 정말 맛있습니다."},
                {"name": "여행자2", "text": "나트랑 필수 맛집이에요."},
                {"name": "여행자3", "text": "재료가 신선합니다."},
                {"name": "여행자4", "text": "다시 가고 싶어요."},
                {"name": "여행자5", "text": "최고의 맛."},
                {"name": "여행자6", "text": "친절하고 맛있어요."},
                {"name": "여행자7", "text": "또 방문할게요."},
                {"name": "여행자8", "text": "강력 추천합니다."},
                {"name": "여행자9", "text": "잊을 수 없는 맛."}
            ],
            "실망": [
                {"name": "한쏠로", "text": "기대만큼 실망이 큼..맛도 쏘쏘.의자도 너무 딱딱."},
                {"name": "정두용", "text": "새우는 괜찮았는데 고기가 들어간 반미는 질겨서 씹을수가 없었고 다 먹고나서 속이 안 좋았어요. CCCP가서 먹었는데 거기 냅킨에 몰래 싸서 버렸네요. 기대보다 별로 였습니다."}
            ],
            "분노": [
                {"name": "Wuri", "text": "정신없이 좁은 곳이지만 확실히 반미 특화! 맛은 있내요!…"},
                {"name": "김건우", "text": "최악입니다 주문 중간중간 확인하세요 누락 시켜놓고 미안하단말도 없이 뻔뻔하게 나옵니다 다들 싸가지가 없어요"}
            ],
            "기대": [
                {"name": "Teo Won", "text": "반미의 성지 반미 판에 다녀왔습니다. 기대를 너무해서 그런지 그냥 그랬습니다.…"},
                {"name": "무계획여행가", "text": "나트랑에서 가장 유명한 반미집 유명해서 너무 큰 기대를 하고 가지는 말자 맛은 그냥 그렇다 다른 베트남 도시들에 있는 유명한 반미 집보다 특별히 나은 점이 있는지 모르겠다"}
            ]
        };

        document.querySelectorAll('.emotion-filter').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.emotion-filter').forEach(b => {
                    b.style.background = 'white';
                    b.style.borderColor = '#ddd';
                });
                this.style.background = 'var(--sidebar-bg)';
                this.style.borderColor = 'var(--accent)';
                
                const emotion = this.getAttribute('data-emotion');
                const reviews = reviewData[emotion] || [];
                const container = document.getElementById('detail-list');
                
                if (reviews.length > 0) {
                    container.innerHTML = reviews.slice(0, 10).map(r => 
                        '<div style="padding:10px 0; border-bottom:1px dashed #ddd;">' +
                            '<p style="margin:0;">"' + r.text + '" - <strong>' + r.name + '</strong></p>' +
                        '</div>'
                    ).join('');
                } else {
                    container.innerHTML = '<p style="text-align:center; color:#777;">해당 감정의 리뷰가 없습니다.</p>';
                }
            });
        });

        // 타임라인 차트 데이터 렌더링
        const timelineData = {
            "0": {"score": 34}, "1": {"score": 25}, "2": {"score": 21}, "3": {"score": 33},
            "4": {"score": 25}, "5": {"score": 30}, "6": {"score": 30}, "7": {"score": 39},
            "8": {"score": 26}, "9": {"score": 24}
        };

        const chartContainer = document.getElementById('timeline-chart');
        
        Object.keys(timelineData).sort().forEach(key => {
            const data = timelineData[key];
            const bar = document.createElement('div');
            bar.style.flex = '1';
            bar.style.height = `${data.score * 2.2}%`;
            bar.style.background = data.score > 30 ? 'var(--accent)' : '#d4c4b5';
            bar.style.borderRadius = '4px';
            bar.style.cursor = 'pointer';
            
            bar.addEventListener('mouseover', (e) => {
                tooltip.style.visibility = 'visible';
                tooltip.innerHTML = `순번: ${Number(key) + 1}<br>점수: ${data.score}<br><small style="color:#aaa;">(키워드 빈도 환산점수)</small>`;
            });
            
            bar.addEventListener('mousemove', (e) => {
                tooltip.style.left = `${e.pageX + 10}px`;
                tooltip.style.top = `${e.pageY - 45}px`;
            });
            
            bar.addEventListener('mouseout', () => {
                tooltip.style.visibility = 'hidden';
            });
            
            chartContainer.appendChild(bar);
        });
    </script>
</body>
</html>
