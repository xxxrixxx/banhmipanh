<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Bánh Mì 탐험지도</title>
    <style>
        :root {
            --app-bg: #f9f7f4;
            --sidebar-bg: #f5efe9;
            --main-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #777777;
            --accent: #a67c52;
            --border-radius: 12px;
        }

        body {
            margin: 0;
            font-family: 'AppleSDGothicNeo-Regular', 'Malgun Gothic', sans-serif;
            background-color: var(--app-bg);
            display: flex;
            height: 100vh;
            color: var(--text-main);
        }

        #desktop-nav {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eaddcf;
        }

        .logo {
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 50px;
            color: #444;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-main);
        }

        .menu-item.active {
            background-color: #eaddcf;
        }

        #mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--sidebar-bg);
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eaddcf;
            z-index: 1000;
        }

        #mobile-nav .menu-item {
            flex-direction: column;
            padding: 5px;
            font-size: 12px;
            margin: 0;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }

        #mobile-nav .menu-item span {
            margin-bottom: 2px;
            font-size: 16px;
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: var(--app-bg);
        }

        @media (max-width: 768px) {
            #desktop-nav {
                display: none;
            }

            #mobile-nav {
                display: flex;
            }

            main {
                padding-bottom: 80px;
            }
        }
    </style>
</head>

<body>
    <nav id="desktop-nav">
        <div class="logo">Bánh Mì 탐험지도</div>
        <a href="dashboard.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
        <hr style="width: 80%; border: 0; border-top: 1px solid #eaddcf; margin: 20px auto;">
        <a href="region.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg> 국가별 리뷰
        </a>
        <a href="insight.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path
                    d="M15 14c.2-1 .7-1.7 1.5-2.5C18 10 18 8 16.5 6.5S13 5 11.5 6.5 10 10 11 11.5c.8.8 1.3 1.5 1.5 2.5">
                </path>
                <path d="M9 18h6"></path>
                <path d="M10 22h4"></path>
            </svg> 데이터 정보
        </a>
    </nav>
    <nav id="mobile-nav">
        <a href="dashboard.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
    </nav>
    <main>
        <div class="header">
            <h1 style="margin:0;"> 실제 리뷰 <span style="color:var(--accent);">탐색</span></h1>
            <p style="margin:0;">한국인들의 실제 반미판 리뷰입니다.</p>
        </div>
        <div class="card" style="margin-top: 20px;">
            <h3>Review Emotion Timeline</h3>
            <div
                style="height:150px; display:flex; align-items:flex-end; gap:5px; padding:20px; background:#fdfdfd; border-radius:8px;">
                <div style="flex:1; height:40%; background:#d4c4b5; border-radius:4px;"></div>
                <div style="flex:1; height:80%; background:var(--accent); border-radius:4px;"></div>
<hr style="border: 0; border-top: 1px solid #eaddcf; margin: 30px 0;">
                <div style="flex:1; height:30%; background:#d4c4b5; border-radius:4px;"></div>
                <div style="flex:1; height:90%; background:var(--accent); border-radius:4px;"></div>
                <div style="flex:1; height:50%; background:#d4c4b5; border-radius:4px;"></div>
            </div>
            <p style="text-align:center; font-size:12px; color:#777; margin-top:10px;">시간 경과에 따른 리뷰 감정 흐름 (긍정: 브라운,
                보통/부정: 크림)</p>
        </div>



        <div class="card">
            <h3>감정별 상세 리뷰 탐색</h3>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin-bottom: 20px;">
                <button class="emotion-filter" data-emotion="기대"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">🤩<br>기대</button>
                <button class="emotion-filter" data-emotion="당황"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">😳<br>당황</button>
                <button class="emotion-filter" data-emotion="충격"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">😱<br>충격</button>
                <button class="emotion-filter" data-emotion="분노"
                    style="padding:20px; background:white; border:1px solid #ddd; border-radius:12px; cursor:pointer; text-align:center;">😡<br>분노</button>
            </div>

            <div id="detail-list" style="margin-top:20px; padding:15px; background:#f9f7f4; border-radius:8px;">
                <p style="text-align:center; color:#777;">감정 카드를 선택하면 상세 리뷰가 나타납니다.</p>
            </div>
        </div>

    
    <script>
        const reviewData = {
            '기대': [{'text': '반미가 너무 기대되네요', 'name': '김반미'}, {'text': '맛있을 것 같아요', 'name': '이탐험'}],
            '당황': [{'text': '웨이팅이 너무 길어서 당황했어요', 'name': '박당황'}, {'text': '주문 방식이 특이해서 놀랐어요', 'name': '최당황'}],
            '충격': [{'text': '생각보다 양이 너무 많아서 충격!', 'name': '정충격'}, {'text': '현지 느낌이 너무 강해서 놀랐습니다', 'name': '윤충격'}],
            '분노': [{'text': '서비스가 불친절해서 화가 났어요', 'name': '강분노'}, {'text': '재료가 다 떨어졌다니 너무하네요', 'name': '이분노'}]
        };

        document.querySelectorAll('.emotion-filter').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.emotion-filter').forEach(b => {
                    b.style.background = 'white';
                    b.style.borderColor = '#ddd';
                });
                this.style.background = 'var(--sidebar-bg)';
                this.style.borderColor = 'var(--accent)';
                
                const emotion = this.getAttribute('data-emotion');
                const reviews = reviewData[emotion] || [];
                const container = document.getElementById('detail-list');
                
                if (reviews.length > 0) {
                    container.innerHTML = reviews.map(r => 
                        '<div style="padding:10px 0; border-bottom:1px dashed #ddd;">' +
                            '<p style="margin:0;">"' + r.text + '" - <strong>' + r.name + '</strong></p>' +
                        '</div>'
                    ).join('');
                } else {
                    container.innerHTML = '<p style="text-align:center; color:#777;">해당 감정의 리뷰가 없습니다.</p>';
                }
            });
        });
    </script>

</body>
</div>
</main>
