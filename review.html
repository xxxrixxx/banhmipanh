<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Bánh Mì 탐험지도</title>
    <style>
        :root {
            --app-bg: #f9f7f4;
            --sidebar-bg: #f5efe9;
            --main-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #777777;
            --accent: #a67c52;
            --border-radius: 12px;
        }

        body {
            margin: 0;
            font-family: 'AppleSDGothicNeo-Regular', 'Malgun Gothic', sans-serif;
            background-color: var(--app-bg);
            display: flex;
            height: 100vh;
            color: var(--text-main);
        }

        #desktop-nav {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eaddcf;
        }

        .logo {
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 50px;
            color: #444;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-main);
        }

        .menu-item.active {
            background-color: #eaddcf;
        }

        #mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--sidebar-bg);
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eaddcf;
            z-index: 1000;
        }

        #mobile-nav .menu-item {
            flex-direction: column;
            padding: 5px;
            font-size: 12px;
            margin: 0;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }

        #mobile-nav .menu-item span {
            margin-bottom: 2px;
            font-size: 16px;
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: var(--app-bg);
        }

        /* 툴팁 스타일 (대시보드와 동일) */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            color: #aaa;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 11px;
            font-weight: normal;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        @media (max-width: 768px) {
            #desktop-nav {
                display: none;
            }

            #mobile-nav {
                display: flex;
            }

            main {
                padding-bottom: 80px;
            }
        }
    </style>
</head>

                {"name": "Joohee Jun", "text": "반미는 늘 맛있지만! 안내 문구에도 패스트 푸드가 아니라고 써 있지만! 뭔가 주문 체계가 꼬 인건지 사람이 별로 없던 오전에, 벨이 울렸지만 또 기다리라고! 오전 8시경 주문하고 40분도 지나서? 받았어요;;;; 제 앞에 2~3팀 있었는데ㅠㅜ 뭐 배달도 있었을테지만.. 개인적으로 15분이상 기다려서 먹을정도는 아닌거 같아요. 다음에 혹시 다시 먹는다면 그랩으로 시키고 그냥 잊어버리고 있으면 좀 더 만족할듯."},
                {"name": "0 Ytinrete", "text": "음.. 로컬맛집 찾아서 돌아다니는 사람들한테는 박한평가를 받을것 같고, 아이동반 여행객들은 익숙하고 평타이상 치는 맛이라서 좋은 평가를 받을것 같습니다. 일단 노점들 위생을 생각하면 노약자 동반 여행객 들이 가기에는 이곳 만 한 반미집이 없습니다. 근데 베트남다운 반미를 먹어야겠다 하시는 분들은 다른 모험을 떠나 시는걸 추천드려요."},
                {"name": "한한", "text": "줄설정도 맛집은 아니에요. 어느 식당이던 식당 손님 반이상이 현지인 아닌식당은 맛집은 아니라고 생각합니다. 그냥 보통의 반미에요. 지나가다 줄 안서고 먹을수있다면 관광객 입장에서 경험해볼만한 맛 이지만. 짧은 여행일정에서 줄서가며 기다릴 맛집은 아닌것같습니다. 현지인들이 제게 왜 한국인은 저 식당에 줄서서 먹는 지 이해 안간다라고 자주 말하는 식당중 이곳이 대표적이에요. 더운데 20분씩 땀흘리며 기다리는 한국분들 자주보니..."},

            "충격": [{"name": "정덩정정", "text": "와진심 존맛임....새우반미 대박이다"}, {"name": "최원나", "text": "간식으로 먹었는데 너무 맛있어서 깜짝 놀랐어요 한국인은 다 좋아할 맛이예요 손님 많은데 직원분들이 친절하시네요 포장해서 길거리 산책하면서 먹었어요 재방문하고 싶은 곳이예요"}],
            "피로": [{"name": "리버민지", "text": "홀에서 먹기는 어렵고 주문 후 음식 받는데까지 약20분 걸린듯 합니다"}, {"name": "Raban", "text": "바게트빵이 진짜 맛있음. 안에 야채나 구성은 적당하고 맛남. 여기 살면 매일 아침마다 먹고 싶음. 야채가 섭웨처럼 많이 들어갔으면 좋겠는데 그게 아쉽. 야채 마니 먹고 싶어요. 야채 추가 옵션 좀 만들어주세요 ㅋㅋ 아침에 가서 웨이팅은 없었음"}, {"name": "Anna", "text": "웨이팅 있다고 해서 그랩으로 배달주문해먹었어요! 타이거새우, 비프치즈, 치킨.. 다 맛있어요 특히 빵이 엄청 바삭해요 ㅎㅎ 추천합니다 !!"}, {"name": "오하나", "text": "맛 괜찮아요 오래기다려서 먹을정도는 아닙니다"}, {"name": "이기헌", "text": "웨이팅은 5분정도 했고 빵도 바삭하고 맛있네요"}, {"name": "정효근", "text": "안쪽 깊게들어가면 에어컨나오는 넓은 곳 있어요 밖에서 힘들게 먹지말고 안에 들어가서 먹음 좋아요 왕새우치즈구이 맛있는데 간혹 소스 적은경우있어서 소스많이달라고하면좋을듯 반잘라달라고하면 먹기편해 요 강추"}, {"name": "송정섭", "text": "웨이팅이 좀 있어요. 그래도 맛 보시면 좋아요"}, {"name": "minhui kim", "text": "기대이상이에요! 빵이 엄청 바삭바삭 하더라고요. 웨이팅이 긴게 단점이지만 매장 안쪽에 웨 이팅존이 있어요. 생각보다 진짜 커서 엄청 배불렀어요 !"}, {"name": "beulah SON", "text": "맛있지만 너무 오래 기다릴 만한 맛까지는 아님."}, {"name": "soyun bang", "text": "구매해서 ccc카페가서 먹었어요:)"}],
            "분노": [{"name": "문정열", "text": "나.보다 늦게 오더한 사람 주문은 나왓는데 내 주문은 안나와서 50분 기다리다 왜 안냐오냐고 햇더니. 네 주문이 누락되엇다고 하네요."}, {"name": "홍영환", "text": "직원분이 누락해서 40분 기다렸네요.. 안나오면 물어보시는걸 추천드립니다"}, {"name": "Wuri", "text": "정신없이 좁은 곳이지만 확실히 반미 특화! 맛은 있내요!…"}, {"name": "강지안", "text": "3일내내 갔던 반미맛집입니다 남편이랑 너무 맛있다고 감탄하면서 먹었어요 근데 진짜 따뜻 할때 먹어야 그맛이 극대화! 약간 대기시간이 있으나 충분히 기다릴만한 시간이이요"}, {"name": "ᄋᄌᄉ", "text": "이렇게까지 줄 서서 먹는 이유를 모르겠음.. 그리고 계산하는 직원이 바빠서 그런지 불친절하고 돈 계산 잘못햇더니 승을 냄"}, {"name": "김유수", "text": "음식 정말 정말 강추 또 오면 또먹고 싶음 왕새우 치즈 구이 진짜 레전드 오브 레전드 무조건 먹어야함 저처럼 편식쟁이들은 야채 다빼고 먹어도 개꿀맛 진짜 맛있음 가격 저렴함 아쉬운거는 화장실 고수냄새 디퓨저가 너무 강함 진짜 음식 맛은 깔게 하나도 없음 하루에 2개씩 먹는중"}, {"name": "빙고bingo", "text": "나에게는 맛이 많이 짜게 느꼈습니다. 사람이 많이 붐비고 할 때는 조심하세요. 배탈 날 수도 있습니다. 저는 예민한 편도 아닌데 바로 화장실로 갔어요. 고기가 덜 구워진 것 같아요."}, {"name": "YUKYUNG YOON", "text": "반미빵이 너무맛있어요 사람많아서 오래기다렸어요 직원들은 그닥 친절하지 않아요 진동벨 주긴하는데 중간중간 누락되니 확인해야되겠더라구요 포장해서 근처 cccp커피 가서 커피랑 같이 먹으니 꿀맛!!!"}, {"name": "김건우", "text": "최악입니다 주문 중간중간 확인하세요 누락 시켜놓고 미안하단말도 없이 뻔뻔하게 나옵니다 다들 싸가지가 없어요"}, {"name": "김민철", "text": "삼겹살반미 먹었는데 안에 작은뼈가 있었음 그래도 맛잇음. 계란반미는 비추 너무 평범함 못생기게구운계란후라이임. 새우반미 개추천. 믹스도 무난 추천. 한국여자들 근처에서 짜증내는소리좀 그만내고 조용히 먹고가길."}],

        document.querySelectorAll('.emotion-filter').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.emotion-filter').forEach(b => {
                    b.style.background = 'white';
                    b.style.borderColor = '#ddd';
                });
                this.style.background = 'var(--sidebar-bg)';
                this.style.borderColor = 'var(--accent)';
                
                const emotion = this.getAttribute('data-emotion');
                const reviews = reviewData[emotion] || [];
                const container = document.getElementById('detail-list');
                
                if (reviews.length > 0) {
                    container.innerHTML = reviews.sort(() => 0.5 - Math.random()).slice(0, 10).map(r => 
                        '<div style="padding:10px 0; border-bottom:1px dashed #ddd;">' +
                            '<p style="margin:0;">"' + r.text + '" - <strong>' + r.name + '</strong></p>' +
                        '</div>'
                    ).join('');
                } else {
                    container.innerHTML = '<p style="text-align:center; color:#777;">해당 감정의 리뷰가 없습니다.</p>';
                }
            });
        });


        // 타임라인 차트 데이터 렌더링
        const timelineData = {
            "0": {"score": 34}, "1": {"score": 25}, "2": {"score": 21}, "3": {"score": 33},
            "4": {"score": 25}, "5": {"score": 30}, "6": {"score": 30}, "7": {"score": 39},
            "8": {"score": 26}, "9": {"score": 24}
        };

        const chartContainer = document.getElementById('timeline-chart');
        
        Object.keys(timelineData).sort().forEach(key => {
            const data = timelineData[key];
            const bar = document.createElement('div');
            bar.style.flex = '1';
            bar.style.height = `${data.score * 2.2}%`;
            bar.style.background = data.score > 30 ? 'var(--accent)' : '#d4c4b5';
            bar.style.borderRadius = '4px';
            bar.style.cursor = 'pointer';
            
            chartContainer.appendChild(bar);
        });
