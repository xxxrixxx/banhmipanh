<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Bánh Mì 탐험지도</title>
    <style>
        :root {
            --app-bg: #f9f7f4;
            --sidebar-bg: #f5efe9;
            --main-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #777777;
            --accent: #a67c52;
            --border-radius: 12px;
        }

        body {
            margin: 0;
            font-family: 'AppleSDGothicNeo-Regular', 'Malgun Gothic', sans-serif;
            background-color: var(--app-bg);
            display: flex;
            height: 100vh;
            color: var(--text-main);
        }

        #desktop-nav {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eaddcf;
        }

        .logo {
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 50px;
            color: #444;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-main);
        }

        .menu-item.active {
            background-color: #eaddcf;
        }

        #mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--sidebar-bg);
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eaddcf;
            z-index: 1000;
        }

        #mobile-nav .menu-item {
            flex-direction: column;
            padding: 5px;
            font-size: 12px;
            margin: 0;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }

        #mobile-nav .menu-item span {
            margin-bottom: 2px;
            font-size: 16px;
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: var(--app-bg);
        }

        @media (max-width: 768px) {
            #desktop-nav {
                display: none;
            }

            #mobile-nav {
                display: flex;
            }

            main {
                padding-bottom: 80px;
            }
        }
    </style>
</head>

<body>
    <nav id="desktop-nav">
        <div class="logo">Bánh Mì 탐험지도</div>
        <a href="dashboard.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
        <hr style="width: 80%; border: 0; border-top: 1px solid #eaddcf; margin: 20px auto;">
        <a href="region.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg> 국가별 리뷰
        </a>
        <a href="insight.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path
                    d="M15 14c.2-1 .7-1.7 1.5-2.5C18 10 18 8 16.5 6.5S13 5 11.5 6.5 10 10 11 11.5c.8.8 1.3 1.5 1.5 2.5">
                </path>
                <path d="M9 18h6"></path>
                <path d="M10 22h4"></path>
            </svg> 데이터 정보
        </a>
    </nav>
    <nav id="mobile-nav">
        <a href="dashboard.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
    </nav>
    <main>
        <div class="header">
            <h1 style="margin:0;">프로젝트 <span style="color:var(--accent);">분석 기록</span></h1>
            <p style="color:var(--text-secondary);">이 분석은 어떤 데이터로 만들어졌을까? </p>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div class="card" style="flex: 2; border: 1px solid #eaddcf;">
                <h3>총 리뷰 구성 (한국인/외국인)</h3>
                <div style="display:flex; flex-direction:column; gap:15px; margin-top:10px;">
                    <div style="display:flex; align-items:center; font-size:14px;">
                        <span style="width:80px; font-weight:bold;">한국인</span>
                        <div style="flex:1; height:15px; background:#eee; border-radius:8px; overflow:hidden;">
                            <div style="width:51%; height:100%; background:var(--accent);"></div>
                        </div>
                        <span style="width:50px; text-align:right;">581건</span>
                    </div>
                    <div style="display:flex; align-items:center; font-size:14px;">
                        <span style="width:80px; font-weight:bold;">외국인</span>
                        <div style="flex:1; height:15px; background:#eee; border-radius:8px; overflow:hidden;">
                            <div style="width:49%; height:100%; background:#d4c4b5;"></div>
                        </div>
                        <span style="width:50px; text-align:right;">566건</span>
                    </div>
                </div>
            </div>
            <div class="card" style="flex: 1; text-align: center; border: 1px solid #eaddcf;">
                <h3 style="color:var(--text-secondary); font-size: 13px; margin-bottom: 10px;">데이터 출처</h3>
                <div class="value" style="color: var(--accent); font-size: 20px; font-weight: bold; margin-top: 15px;">
                    Google Maps</div>
            </div>
            <div class="card" style="flex: 1; text-align: center; border: 1px solid #eaddcf;">
                <h3 style="color:var(--text-secondary); font-size: 13px; margin-bottom: 10px;">분석 기준</h3>
                <div class="value" style="color: var(--accent); font-size: 20px; font-weight: bold; margin-top: 15px;">
                    최근 6개월</div>
            </div>
        </div>
</body>

</html>
