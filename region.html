<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Bánh Mì 탐험지도</title>
    <style>
        :root {
            --app-bg: #f9f7f4;
            --sidebar-bg: #f5efe9;
            --main-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #777777;
            --accent: #a67c52;
            --border-radius: 12px;
        }

        body {
            margin: 0;
            font-family: 'AppleSDGothicNeo-Regular', 'Malgun Gothic', sans-serif;
            background-color: var(--app-bg);
            display: flex;
            height: 100vh;
            color: var(--text-main);
        }

        #desktop-nav {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eaddcf;
        }

        .logo {
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 50px;
            color: #444;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-main);
        }

        .menu-item.active {
            background-color: #eaddcf;
        }

        #mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--sidebar-bg);
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eaddcf;
            z-index: 1000;
        }

        #mobile-nav .menu-item {
            flex-direction: column;
            padding: 5px;
            font-size: 12px;
            margin: 0;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }

        #mobile-nav .menu-item span {
            margin-bottom: 2px;
            font-size: 16px;
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: var(--app-bg);
        }

        @media (max-width: 768px) {
            #desktop-nav {
                display: none;
            }

            #mobile-nav {
                display: flex;
            }

            main {
                padding-bottom: 80px;
            }
        }
    </style>
</head>

<body>
    <nav id="desktop-nav">
        <div class="logo">Bánh Mì 탐험지도</div>
        <a href="dashboard.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
        <hr style="width: 80%; border: 0; border-top: 1px solid #eaddcf; margin: 20px auto;">
        <a href="region.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg> 국가별 리뷰
        </a>
        <a href="insight.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:10px;">
                <path
                    d="M15 14c.2-1 .7-1.7 1.5-2.5C18 10 18 8 16.5 6.5S13 5 11.5 6.5 10 10 11 11.5c.8.8 1.3 1.5 1.5 2.5">
                </path>
                <path d="M9 18h6"></path>
                <path d="M10 22h4"></path>
            </svg> 데이터 정보
        </a>
    </nav>
    <nav id="mobile-nav">
        <a href="dashboard.html" class="menu-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="12 2 15 9 22 12 15 15 12 22 9 15 2 12 9 9 12 2"></polygon>
            </svg> 탐험
        </a>
        <a href="mental_break.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 9h.01M16 9h.01M12 16c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"></path>
            </svg> 멘붕
        </a>
        <a href="shock.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg> 충격
        </a>
        <a href="review.html" class="menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-bottom:2px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg> 후기
        </a>
    </nav>

<main>
    <div class="header">
        <h1 style="margin:0;">국가별로 다른 <span style="color:var(--accent);">반미 경험</span></h1>
        <p style="color:var(--text-secondary);">리뷰데이터를 바탕으로 나라별 반미스타일을 분석합니다.</p>
    </div>

    <div class="card">
        <h3>국가 선택</h3>
        <div id="country-filters" style="display:flex; gap:15px; flex-wrap:wrap; margin-top:15px;"></div>
    </div>

    <div id="placeholder-msg"
        style="text-align:center; padding:50px; color:#777; font-size:14px; background:white; border:1px solid #eee; border-radius:12px; margin-top:20px;">
        국가를 선택하시면 상세 리뷰가 나타납니다.
    </div>
    <div id="region-detail" style="display:none; grid-template-columns: repeat(2, 1fr); gap:20px; margin-top:20px;">
        <div class="card">
            <h3>상세 통계</h3>
            <div id="country-stats" style="font-size:14px; padding:10px;"></div>
        </div>
        <div class="card">
            <h3>감정 태그</h3>
            <div id="country-tags" style="padding:10px; display:flex; gap:10px;"></div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h3>상세 리뷰</h3>
            <div id="detail-reviews" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
    </div>

    <script>
        const regionData = {
            "러시아": {
                "별점": "4.5", "메뉴": "소고기 반미", "태그": ["#최고", "#푸짐"],
                "리뷰": [
                    { "name": "Ана", "text": "맛있어요! 러시아어 메뉴도 있어요." },
                    { "name": "Ксения Власова", "text": "맛있고, 빨리 나오고, 러시아어 메뉴도 있고, 실내에 에어컨도 있어요." },
                    { "name": "Анастасия Павликова", "text": "맛있는 반미, 다양한 속재료, 빠른 조리." },
                    { "name": "Алексей Шулика", "text": "맛있고 토핑도 푸짐해요." },
                    { "name": "Анастасия Русакова", "text": "가장 맛있어요" },
                    { "name": "Артём Путинцев", "text": "맛있고 바삭한 빵, 주문이 빨리 나왔어요." }
                ]
            },
            "영어권": {
                "별점": "4.6", "메뉴": "비프 반미", "태그": ["#훌륭", "#감사"],
                "리뷰": [
                    { "name": "Nadya Parsley", "text": "맛있는!" },
                    { "name": "Penny Lau", "text": "정말 맛있고 훌륭한 음식이었어요." },
                    { "name": "Jordan Alcantara", "text": "정말 멋진 저녁 식사였어요! 가족이나 친구들과 함께 가기에 강력 추천합니다." },
                    { "name": "Dos (BIZZLE)", "text": "음식도 맛있고 서비스도 빨랐어요! 추천합니다!" },
                    { "name": "Danish Iskandar", "text": "음식 정말 맛있어요! 10점 만점에 10점!" },
                    { "name": "Kennard Ramba", "text": "음식도 맛있고 서비스도 좋았어요." }
                ]
            },
            "중국": {
                "별점": "4.3", "메뉴": "믹스 반미", "태그": ["#맛있음", "#깔끔"],
                "리뷰": [
                    { "name": "Clary Chong", "text": "음식도 맛있었고, 반찬도 종류별로 다 나왔어요. 강력 추천합니다!" },
                    { "name": "ling", "text": "상당히 괜찮습니다." }
                ]
            },
            "말레이어": {
                "별점": "4.7", "메뉴": "치킨 반미", "태그": ["#만족", "#친절"],
                "리뷰": [
                    { "name": "sarah ziyad", "text": "그걸 살 여유가 있어서 좋네요." },
                    { "name": "asyraf ariffin", "text": "정말 맛있어요." },
                    { "name": "Bukhari Razali", "text": "아주 맛있어요" },
                    { "name": "Bukhari Razali Personal", "text": "아주 맛있어요" }
                ]
            }
        };

        const flagMap = {
            "러시아": "🇷🇺",
            "영어권": "🇺🇸",
            "중국": "🇨🇳",
            "말레이어": "🇲🇾"
        };

        const filterContainer = document.getElementById('country-filters');
        Object.keys(regionData).forEach(country => {
            const btn = document.createElement('button');
            btn.className = 'country-filter';
            btn.setAttribute('data-country', country);
            btn.style.padding = '15px';
            btn.style.background = 'white';
            btn.style.border = '1px solid #ddd';
            btn.style.borderRadius = '12px';
            btn.style.cursor = 'pointer';
            btn.style.minWidth = '80px';
            btn.style.textAlign = 'center';
            btn.innerHTML = `${flagMap[country] || '🌐'}<br><strong>${country}</strong>`;
            
            btn.addEventListener('click', function () {
                document.querySelectorAll('.country-filter').forEach(b => { b.style.borderColor = '#ddd'; });
                this.style.borderColor = 'var(--accent)';
                const data = regionData[country];
                
                document.getElementById('region-detail').style.display = 'grid';
                document.getElementById('placeholder-msg').style.display = 'none';
                
                document.getElementById('country-stats').innerHTML = `<p>평균 별점: <strong>${data.별점}</strong></p><p>인기 메뉴: <strong>${data.메뉴}</strong></p>`;
                document.getElementById('country-tags').innerHTML = data.태그.map(t => `<span style="background:#f5efe9; padding:5px 10px; border-radius:4px; color:var(--accent);">${t}</span>`).join('');
                
                // 리뷰 내용을 '리뷰내용 - 작성자' 형식으로 무작위 5개까지 출력
                document.getElementById('detail-reviews').innerHTML = data.리뷰.sort(() => 0.5 - Math.random()).slice(0, 5).map(r => 
                    `<div style="padding:10px 0; border-bottom:1px dashed #ddd;">"${r.text}" - <strong>${r.name}</strong></div>`
                ).join('');
            });
            filterContainer.appendChild(btn);
        });
    </script>
</main>
</body>

</html>
